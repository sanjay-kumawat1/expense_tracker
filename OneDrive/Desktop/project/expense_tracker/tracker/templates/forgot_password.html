<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800/80 backdrop-blur-xl p-8 rounded-2xl w-full max-w-md shadow-2xl border border-gray-700">

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg {% if message.tags == 'error' %}bg-red-500/20 border-red-500/50 text-red-200{% else %}bg-green-500/20 border-green-500/50 text-green-200{% endif %} border">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent mb-2">Forgot Password?</h2>
            <p class="text-gray-400">Enter your email and we'll send you an OTP to reset your password</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <input type="email" name="email" placeholder="Enter your email" required
                       class="w-full p-4 bg-gray-700/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent text-white placeholder-gray-400 transition-all duration-200">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 p-4 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
                Send OTP
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="{% url 'login' %}" class="text-blue-400 hover:text-blue-300 font-semibold">← Back to Login</a>
        </div>

    </div>
</body>
</html>
