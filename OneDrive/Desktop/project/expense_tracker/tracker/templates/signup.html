<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Auth System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
        .gradient-pink { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .glow { box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-pink-900 relative overflow-hidden">
    <!-- Background Animation -->
    <div class="absolute inset-0">
        <div class="absolute top-20 right-20 w-72 h-72 bg-pink-500/20 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-20 left-20 w-72 h-72 bg-purple-500/20 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="fixed top-6 right-6 z-50 max-w-sm w-full mx-4 p-4 rounded-2xl glass border-2 {% if message.tags == 'success' %}border-green-400 bg-green-500/10 text-green-200{% else %}border-red-400 bg-red-500/10 text-red-200{% endif %} glow animate-pulse">
                    <i class="fas {% if message.tags == 'success' %}fa-check-circle{% else %}fa-exclamation-triangle{% endif %} mr-2"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="w-full max-w-md">
            <div class="glass rounded-3xl p-10 border border-white/20 glow">
                <div class="text-center mb-10">
                    <div class="gradient-pink w-20 h-20 rounded-2xl mx-auto mb-4 flex items-center justify-center glow text-2xl">
                        <i class="fas fa-user-plus text-white"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
                    <p class="text-slate-300">Join us today</p>
                </div>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-200 mb-3">Full Name</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-4 text-slate-400"></i>
                            <input type="text" name="name" required 
                                   class="w-full pl-12 pr-4 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-slate-400 
                                          focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all" 
                                   placeholder="John Doe">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-200 mb-3">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-4 text-slate-400"></i>
                            <input type="email" name="email" required 
                                   class="w-full pl-12 pr-4 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-slate-400 
                                          focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all" 
                                   placeholder="your@email.com">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-200 mb-3">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                                <input type="password" name="password" required 
                                       class="w-full pl-12 pr-4 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-slate-400 
                                              focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all" 
                                       placeholder="••••••••">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-200 mb-3">Confirm</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                                <input type="password" name="password2" required 
                                       class="w-full pl-12 pr-4 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-slate-400 
                                              focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all" 
                                       placeholder="••••••••">
                            </div>
                        </div>
                    </div>

                    <button type="submit" 
                            class="w-full gradient-pink text-white font-semibold py-4 px-6 rounded-2xl glow btn-hover text-lg">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>

                    <div class="text-center pt-6">
                        <span class="text-slate-300">Already have account? </span>
                        <a href="{% url 'login' %}" class="text-pink-400 hover:text-pink-300 font-semibold text-lg">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
