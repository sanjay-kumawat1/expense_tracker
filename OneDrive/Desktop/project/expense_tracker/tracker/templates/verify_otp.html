<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800/80 backdrop-blur-xl p-8 rounded-2xl w-full max-w-md shadow-2xl border border-gray-700">
        
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg {% if message.tags == 'error' %}bg-red-500/20 border-red-500/50 text-red-200{% else %}bg-green-500/20 border-green-500/50 text-green-200{% endif %} border">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-blue-400 to-cyan-500 rounded-2xl mx-auto mb-4 flex items-center justify-center text-2xl">📧</div>
            <h2 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-500 bg-clip-text text-transparent mb-2">Verify OTP</h2>
            <p class="text-gray-400">Enter 6-digit code sent to <strong>{{ email }}</strong></p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="text" 
                   name="otp" 
                   placeholder="123456" 
                   maxlength="6" 
                   required 
                   class="w-full p-6 bg-gray-700/50 border-2 border-dashed border-gray-600 rounded-2xl focus:ring-4 focus:ring-blue-500 focus:border-transparent text-white placeholder-gray-400 text-center text-3xl tracking-widest font-mono font-bold letter-spacing-6">
            <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-cyan-600 hover:from-blue-600 hover:to-cyan-700 p-4 rounded-2xl font-semibold text-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200">
                Verify OTP
            </button>
        </form>

        <div class="text-center mt-6 space-y-2">
            <p class="text-sm text-gray-400">Didn't receive code?</p>
            <a href="{% url 'forgot_password' %}" class="text-blue-400 hover:text-blue-300 font-semibold text-sm">Resend OTP</a>
        </div>
        
        <p class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-gray-400 hover:text-gray-300 text-sm">← Back to Login</a>
        </p>
    </div>
</body>
</html>
