<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800/80 backdrop-blur-xl p-8 rounded-2xl w-full max-w-md shadow-2xl border border-gray-700">

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg {% if message.tags == 'error' %}bg-red-500/20 border-red-500/50 text-red-200 animate-pulse{% else %}bg-green-500/20 border-green-500/50 text-green-200{% endif %} border">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-purple-400 to-pink-500 rounded-2xl mx-auto mb-4 flex items-center justify-center text-3xl">🔑</div>
            <h2 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">New Password</h2>
            <p class="text-gray-400 text-lg">Create your new password (Minimum 8 characters)</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <input type="password" 
                       name="password" 
                       placeholder="New Password" 
                       required 
                       minlength="8"
                       class="w-full p-4 bg-gray-700/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent text-white placeholder-gray-400 transition-all duration-200 text-lg tracking-wide">
                <p class="text-xs text-gray-500 mt-1">Minimum 8 characters required</p>
            </div>
            
            <div>
                <input type="password" 
                       name="password2" 
                       placeholder="Confirm New Password" 
                       required 
                       class="w-full p-4 bg-gray-700/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent text-white placeholder-gray-400 transition-all duration-200 text-lg tracking-wide">
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-600 hover:to-pink-700 p-4 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
                Reset Password
            </button>
        </form>

        <div class="text-center mt-6 space-y-2">
            <a href="{% url 'login' %}" class="block w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 p-3 rounded-xl font-semibold text-white transition-all duration-200">
                ← Back to Login
            </a>
            <p class="text-xs text-gray-500">Your account security is our priority!</p>
        </div>

    </div>
</body>
</html>
